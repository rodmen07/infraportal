<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/rmcc.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RM Cloud Consulting</title>
  </head>
  <body>
    <div id="boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#09090b;color:#e4e4e7;padding:24px;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">
      <div style="max-width:560px;border:1px solid rgba(239,68,68,.35);background:rgba(24,24,27,.92);border-radius:16px;padding:20px 18px;box-shadow:0 10px 30px rgba(0,0,0,.45);">
        <h1 style="margin:0 0 10px 0;font-size:20px;line-height:1.3;color:#fca5a5;">Main page did not load yet</h1>
        <p style="margin:0 0 6px 0;font-size:14px;line-height:1.6;color:#d4d4d8;">If this message stays on screen, the app bundle likely failed to start.</p>
        <p style="margin:0 0 14px 0;font-size:12px;line-height:1.5;color:#a1a1aa;">Try refreshing, then open devtools console if the issue persists.</p>
        <button type="button" onclick="window.location.reload()" style="border:1px solid rgba(113,113,122,.7);background:#27272a;color:#fafafa;border-radius:8px;padding:7px 10px;font-size:12px;cursor:pointer;">Reload page</button>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Apply saved theme before React mounts to prevent flash of wrong theme
      ;(function(){var t=localStorage.getItem('theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t)})()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frontend CMS</title>
  </head>
  <body>
    <nav id="admin-nav" style="position:fixed;left:12px;right:12px;bottom:12px;z-index:9999;display:flex;gap:8px;flex-wrap:wrap;"></nav>
    <script>
      (function () {
        const STORAGE_KEY = 'taskforge.auth.session'
        const basePath = '/frontend-service/'
        const nav = document.getElementById('admin-nav')

        function navLink(href, text) {
          return (
            '<a href="' +
            href +
            '" style="padding:8px 12px;border-radius:10px;background:#18181b;color:#e4e4e7;border:1px solid #3f3f46;text-decoration:none;font:600 13px system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">' +
            text +
            '</a>'
          )
        }

        function renderNav() {
          if (!nav) {
            return
          }

          const links = []
          if (window.location.hash !== '#admin-dashboard') {
            links.push(navLink(basePath + '#admin-dashboard', 'Open Dashboard'))
          }
          links.push(navLink(basePath, 'Back to Main Page'))
          nav.innerHTML = links.join('')
        }

        function hasAdminSession() {
          try {
            const raw = window.localStorage.getItem(STORAGE_KEY)
            if (!raw) {
              return false
            }

            const parsed = JSON.parse(raw)
            if (!parsed || typeof parsed !== 'object') {
              return false
            }

            const expiresAt = Number(parsed.expiresAt)
            if (!Number.isFinite(expiresAt) || expiresAt <= Date.now()) {
              return false
            }

            const roles = Array.isArray(parsed.roles) ? parsed.roles : []
            return roles.some((role) => String(role).toLowerCase() === 'admin')
          } catch {
            return false
          }
        }

        if (!hasAdminSession()) {
          const message = document.createElement('main')
          message.setAttribute(
            'style',
            'font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:2rem;max-width:720px;margin:0 auto;color:#e4e4e7;background:#09090b;min-height:100vh;'
          )
          message.innerHTML =
            '<h1 style="margin:0 0 0.75rem;font-size:1.5rem;">Admin access required</h1>' +
            '<p style="line-height:1.6;color:#a1a1aa;">Sign in as an admin user in the app first, then reopen the CMS.</p>' +
            '<p style="margin-top:1rem;"><a href="/frontend-service/" style="color:#f59e0b;text-decoration:none;">Return to app</a></p>'
          document.body.prepend(message)
          renderNav()
          return
        }

        renderNav()
        const script = document.createElement('script')
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js'
        document.body.appendChild(script)
      })()
    </script>
  </body>
</html>

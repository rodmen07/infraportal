name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        # Audit shipped (production) dependencies and fail on high+ severity.
        # Dev/build-tool advisories (e.g. a vite major-version bump) are tracked
        # separately so they do not block delivery of the app itself.
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: infraportal
          name: infraportal-coverage
        continue-on-error: true

      - name: Check test results
        if: failure()
        run: echo "::error::Tests failed. See output above for details."
        shell: bash

  lint:
    runs-on: ubuntu-latest
    name: Linting
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check lint results
        if: failure()
        run: echo "::error::Linting failed. See output above for details."
        shell: bash

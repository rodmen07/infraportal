name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
      VITE_AUTH_API_BASE_URL: ${{ vars.VITE_AUTH_API_BASE_URL || secrets.VITE_AUTH_API_BASE_URL }}
      VITE_ACCOUNTS_API_BASE_URL: https://accounts-service.fly.dev
      VITE_CONTACTS_API_BASE_URL: https://contacts-service.fly.dev
      VITE_ACTIVITIES_API_BASE_URL: https://taskforge-activities-service.fly.dev
      VITE_OPPORTUNITIES_API_BASE_URL: https://taskforge-opportunities-service.fly.dev
      VITE_AUTOMATION_API_BASE_URL: https://taskforge-automation-service.fly.dev
      VITE_INTEGRATIONS_API_BASE_URL: https://taskforge-integrations-service.fly.dev
      VITE_REPORTING_API_BASE_URL: https://taskforge-reporting-service.fly.dev
      VITE_SEARCH_API_BASE_URL: https://taskforge-search-service.fly.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_KEY: ${{ secrets.VITE_ADMIN_KEY }}
          VITE_MONITORING_URL: ${{ vars.VITE_MONITORING_URL }}
          VITE_AI_ORCHESTRATOR_URL: ${{ vars.VITE_AI_ORCHESTRATOR_URL }}
          VITE_AUTH_SERVICE_URL: ${{ vars.VITE_AUTH_SERVICE_URL }}
          VITE_CONTACTS_API_BASE_URL: ${{ vars.VITE_CONTACTS_API_BASE_URL }}
          VITE_ACCOUNTS_API_BASE_URL: ${{ vars.VITE_ACCOUNTS_API_BASE_URL }}
          VITE_OPPORTUNITIES_API_BASE_URL: ${{ vars.VITE_OPPORTUNITIES_API_BASE_URL }}
          VITE_ACTIVITIES_API_BASE_URL: ${{ vars.VITE_ACTIVITIES_API_BASE_URL }}
          VITE_EVENT_STREAM_URL: ${{ vars.VITE_EVENT_STREAM_URL }}
          VITE_SEARCH_API_BASE_URL: ${{ vars.VITE_SEARCH_API_BASE_URL }}
          VITE_REPORTING_API_BASE_URL: ${{ vars.VITE_REPORTING_API_BASE_URL }}
          VITE_OBSERVABOARD_URL: ${{ vars.VITE_OBSERVABOARD_URL }}
          VITE_SPEND_API_BASE_URL: ${{ vars.VITE_SPEND_API_BASE_URL }}
          VITE_PROJECTS_API_BASE_URL: ${{ vars.VITE_PROJECTS_API_BASE_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
